<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Allianz México</title>
    <style>
        :root {
            --primary-color: #023583;
            --bg-color: #023583;
            --text-dark: #2c3e50;
            --btn-inactive-bg: #f2f4f7;
            --btn-inactive-text: #627285;
            --border-color: #d1d5db;
            --error-color: #dc2626;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .login-container {
            background-color: #ffffff;
            padding: 35px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 420px;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo-box {
            background-color: var(--primary-color);
            color: #ffffff;
            font-weight: 700;
            font-size: 15px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-right: 12px;
            letter-spacing: 0.5px;
        }

        .company-name {
            color: var(--primary-color);
            font-size: 20px;
            font-weight: 700;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .toggle-btn {
            flex: 1;
            padding: 11px;
            border: 1px solid transparent;
            border-radius: 6px;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .toggle-btn.active {
            background-color: var(--primary-color);
            color: #ffffff;
        }

        .toggle-btn.inactive {
            background-color: var(--btn-inactive-bg);
            color: var(--btn-inactive-text);
            border-color: #e5e7eb;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        .input-container {
            position: relative;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 10px 40px 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password svg {
            stroke: #9ca3af;
            transition: stroke 0.2s;
        }

        .toggle-password:hover svg {
            stroke: var(--primary-color);
        }

        .error-msg {
            color: var(--error-color);
            font-size: 11px;
            font-weight: 600;
            margin: 0 0 14px 0;
            text-align: center;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #01245a;
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: wait;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="header">
            <div class="logo-box">AZ</div>
            <div class="company-name">Allianz México</div>
        </div>

        <div class="button-group">
            <button class="toggle-btn active" type="button" id="btn-diario">Reporte Diario</button>
            <button class="toggle-btn inactive" type="button" id="btn-comparativo" disabled title="Próximamente disponible">Análisis Comparativo</button>
        </div>

        <form id="login-form" onsubmit="return false;">
            <div class="form-group">
                <label for="password">CONTRASEÑA</label>
                <div class="input-container">
                    <input type="password" id="password" name="password" autocomplete="current-password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword()" aria-label="Mostrar u ocultar contraseña">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <p id="error-msg" class="error-msg" style="display:none;">Contraseña incorrecta. Intenta de nuevo.</p>

            <button type="submit" class="submit-btn" id="submit-btn">Ingresar</button>
        </form>
    </div>

        // ── Mostrar / ocultar contraseña ─────────────────────────────────────
        function togglePassword() {
            const passwordField = document.getElementById("password");
            const eyeIcon = document.getElementById("eye-icon");

            if (passwordField.type === "password") {
                passwordField.type = "text";
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                passwordField.type = "password";
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        // ── Helpers Base64 <-> bytes ─────────────────────────────────────────
        function b64ToBytes(b64) {
            return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        }

        // ── Descifrado AES-256-GCM (PBKDF2-HMAC-SHA256 + AES-GCM) ────────────
        async function descifrarReporte(password) {
            const enc  = new TextEncoder();
            const salt = b64ToBytes(REPORTE_CIFRADO.salt);
            const iv   = b64ToBytes(REPORTE_CIFRADO.iv);
            const data = b64ToBytes(REPORTE_CIFRADO.data);

            const keyMaterial = await crypto.subtle.importKey(
                "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]
            );
            const key = await crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: salt, iterations: REPORTE_CIFRADO.iter, hash: "SHA-256" },
                keyMaterial,
                { name: "AES-GCM", length: 256 },
                false,
                ["decrypt"]
            );

            // Lanza una excepción si la contraseña es incorrecta (falla la verificación del tag GCM)
            const decryptedBuffer = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, data);
            return new TextDecoder().decode(decryptedBuffer);
        }

        // ── Manejo del formulario ─────────────────────────────────────────────
        document.getElementById("login-form").addEventListener("submit", async function (e) {
            e.preventDefault();

            const btn  = document.getElementById("submit-btn");
            const err  = document.getElementById("error-msg");
            const pwd  = document.getElementById("password").value;

            err.style.display = "none";
            btn.disabled = true;
            btn.textContent = "Verificando...";

            try {
                const htmlReporte = await descifrarReporte(pwd);
                document.open();
                document.write(htmlReporte);
                document.close();
            } catch (ex) {
                err.style.display = "block";
                btn.disabled = false;
                btn.textContent = "Ingresar";
                const pwdField = document.getElementById("password");
                pwdField.value = "";
                pwdField.focus();
            }
        });
    </script>
